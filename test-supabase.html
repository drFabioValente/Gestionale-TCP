<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Test Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Test Supabase</h1>
  <button id="btn">Carica pazienti</button>
  <pre id="out">Pronto.</pre>

  <script>
    const out = document.getElementById("out");

    function log(msg) {
      out.textContent = msg;
    }

    log("Script caricato.");

    const supabaseUrl = "https://gwzviegdrdbfjwcsjvlk.supabase.co";
    const supabaseKey = "sb_publishable_hBddXLwiRCpnU5-E0WQu2Q_uj57BNdZ";

    let supabase = null;

    try {
      if (!window.supabase || !window.supabase.createClient) {
        throw new Error("Libreria Supabase non caricata");
      }
      supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
      log("Client Supabase creato. Premi il pulsante.");
    } catch (e) {
      log("Errore iniziale: " + e.message);
    }

    document.getElementById("btn").addEventListener("click", async function () {
      log("Click ricevuto. Provo a leggere da Supabase...");

      try {
        const { data, error } = await supabase
          .from("pazienti_tcp")
          .select("id,mese,nome")
          .limit(10);

        if (error) {
          log("Errore Supabase: " + error.message);
          return;
        }

        log(JSON.stringify(data, null, 2));
      } catch (e) {
        log("Errore JS: " + e.message);
      }
    });
  </script>
</body>
</html>
