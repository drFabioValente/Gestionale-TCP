
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gestione TCP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
<h2>Gestione Pazienti TCP</h2>

<button onclick="carica()">Carica da Supabase</button>

<ul id="lista"></ul>

<script>
const supabaseUrl = "https://gwzviegdrdbfjwcsjvlk.supabase.co";
const supabaseKey = "sb_publishable_hBddXLwiRCpnU5-E0WQu2Q_uj57BNdZ";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function carica() {
  const { data, error } = await supabase
    .from("pazienti_tcp")
    .select("*");

  if (error) {
    alert("Errore: " + error.message);
    return;
  }

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(p => {
    const li = document.createElement("li");
    li.textContent = p.nome + " - " + p.mese;
    lista.appendChild(li);
  });
}
</script>

</body>
</html>
